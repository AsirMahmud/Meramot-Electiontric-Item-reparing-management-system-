services:
  postgres:
    image: postgres:16-alpine
    container_name: meeramoot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: meeramoot_electric_repair
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - meeramoot_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d meeramoot_electric_repair"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  meeramoot_postgres_data: